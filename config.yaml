# =============================================================================
# vir-bot 主配置文件
# 所有配置集中于此，通过 config.py 加载为类型安全的 dataclass
# =============================================================================

app:
  name: "vir-bot"
  version: "0.1.0"
  debug: false
  # 隐私优先：所有数据本地处理
  data_dir: "./data"
  log_dir: "./data/logs"
  log_level: "INFO" # DEBUG / INFO / WARNING / ERROR

# -----------------------------------------------------------------------------
# AI 后端配置（策略模式，可切换）
# -----------------------------------------------------------------------------
ai:
  # 当前激活的后端：ollama | openai | local_model
  provider: "openai"

  # Ollama 配置（本地推理）
  ollama:
    base_url: "http://localhost:11434"
    model: "qwen2.5:7b"
    keep_alive: "5m"
    timeout: 120

  # OpenAI 兼容 API（Qwen / DeepSeek / 等）
  openai:
    base_url: "https://openrouter.ai/api/v1"
    api_key: "" # 从环境变量 VIRBOT_OPENAI_KEY 读取，勿在此硬编码
    model: "inclusionai/ling-2.6-1t:free"
    timeout: 60
    max_retries: 3

  # 本地模型文件（llama.cpp server / ollama serve）
  local_model:
    base_url: "http://localhost:8080"
    model: "local-model"
    timeout: 180

# -----------------------------------------------------------------------------
# 角色卡配置
# -----------------------------------------------------------------------------
character:
  card_path: "./data/characters/default.json"
  extensions:
    voice_style: "撒娇"
    personality_tags: ["活泼", "温暖"]
    background_knowledge: "./data/knowledge/"

# -----------------------------------------------------------------------------
# 记忆系统配置
# -----------------------------------------------------------------------------
memory:
  short_term:
    max_turns: 20
    window_size: 10

  long_term:
    enabled: true
    vector_db: "chroma"
    persist_dir: "./data/memory/chroma_db"
    collection_name: "persona_memory"
    top_k: 5
    embedding_model: "all-MiniLM-L6-v2"
    auto_index: true

  # 新功能特性开关（默认关闭，逐步启用）
  features:
    reranker:
      enabled: true
      model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
      top_k: 5
    composer:
      enabled: true
      max_tokens: 2000
    quality_gate:
      enabled: true
    verifier:
      enabled: true
    lifecycle:
      enabled: true
      short_term_ttl: 30
      long_term_archive_after: 180
    graph:
      enabled: true
      persist_path: "./data/memory/memory_graph.json"
    versioning:
      enabled: true
      max_versions: 10

# -----------------------------------------------------------------------------
# 多平台接入配置
# -----------------------------------------------------------------------------
platforms:
  # QQ（OneBot v11/v12）
  qq:
    enabled: false
    adapter: "onebot_v11"
    connection:
      type: "正向WebSocket"
      host: "0.0.0.0"
      port: 8080
    access_token: ""
    allowed_groups: []
    allowed_users: []
    block_list: []
    rate_limit:
      per_user: 20
      per_group: 60

  # 微信
  wechat:
    enabled: false
    adapter: "wechat_work"
    wechat_work:
      corp_id: ""
      corp_secret: ""
      agent_id: ""
      token: ""
      encoding_aes_key: ""
    allowed_users: []

  # Discord
  discord:
    enabled: false
    bot_token: ""
    guilds:
      - id: ""
        name: ""
        allowed_channels: []
    rate_limit:
      per_channel: 10

# -----------------------------------------------------------------------------
# 消息处理管道配置
# -----------------------------------------------------------------------------
pipeline:
  max_context_turns: 20
  handlers:
    - "text"
  filters:
    block_bots: true
    block_self: true
    min_content_length: 1
    max_content_length: 4096

# -----------------------------------------------------------------------------
# MCP 工具协议配置
# -----------------------------------------------------------------------------
mcp:
  enabled: true
  builtin_tools:
    - "memory_query"
    - "memory_forget"
    - "character_update"
    - "calculator"
  tool_discovery:
    enabled: true
    directories:
      - "./vir_bot/core/mcp/tools/"
    auto_reload: true
  hardware:
    enabled: false
    mqtt:
      broker_url: "mqtt://localhost:1883"
      username: ""
      password: ""
      esp32_topics: ["vir-bot/esp32/#"]

# -----------------------------------------------------------------------------
# 语音模块（预留）
# -----------------------------------------------------------------------------
voice:
  enabled: false
  tts:
    provider: "edge"
    voice_id: "zh-CN-XiaoxiaoNeural"
    speed: 1.0
  asr:
    provider: "whisper"
    model: "base"
    language: "zh"
  wake_word:
    provider: "porcupine"
    keywords: ["hey-vir"]

# -----------------------------------------------------------------------------
# 视觉感知模块（预留）
# -----------------------------------------------------------------------------
visual:
  enabled: false
  camera:
    provider: "esp32"
    esp32_url: "http://esp32-cam.local/capture"
    capture_interval: 10
  vision:
    provider: "openai"
    model: "qwen-vl-plus"
    base_url: "http://localhost:8080"
    max_image_size: 1024

# -----------------------------------------------------------------------------
# Web 控制台配置
# -----------------------------------------------------------------------------
web_console:
  enabled: true
  host: "0.0.0.0"
  port: 7860
  auth:
    enabled: true
    token: "vir-bot-console-token"
  cors:
    allow_origins: ["http://localhost:7860"]
    allow_credentials: true

# -----------------------------------------------------------------------------
# 安全与隐私配置
# -----------------------------------------------------------------------------
security:
  log_sanitization: true
  encrypt_local_data: false
  max_tokens: 4096
  http_timeout: 30

# -----------------------------------------------------------------------------
# 主动消息配置（牵挂驱动）
# -----------------------------------------------------------------------------
proactive:
  enabled: true # 启用主动消息测试
  check_interval_seconds: 60 # 1分钟检查一次（测试用）
  min_cooldown_seconds: 60 # 1分钟冷却（测试用）
  max_daily_messages: 20
  concern:
    threshold: 0.7
    llm_evaluate: true
  expression:
    max_context_memories: 5
    max_tokens: 200
  # 主动消息发送目标（根据启用的平台配置）
  targets:
    qq:
      user_id: "" # QQ号，留空则使用最后交互的用户
      group_id: "" # 群号，留空则发给私聊
    discord:
      channel_id: "" # Discord频道ID
    wechat:
      touser: "" # 企业微信用户ID
